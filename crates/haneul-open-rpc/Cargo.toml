[package]
name = "haneul-open-rpc"
version = "0.6.1"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
schemars = "0.8.10"
serde = "1.0.141"
serde_json = "1.0.83"
workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
clap = { version = "3.2.17", features = ["derive"] }
pretty_assertions = "1.2.0"
serde_json = "1.0.83"
tokio = { version = "1.20.1", features = ["full"] }
hyper = { version = "0.14.20", features = ["full"] }

haneul = { path = "../haneul" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-json = { path = "../haneul-json" }
haneul-types = { path = "../haneul-types" }
haneul-config = { path = "../haneul-config" }
test-utils = { path = "../test-utils" }
rand = "0.8.5"

move-package.workspace = true
move-core-types.workspace = true

[[example]]
name = "generate-json-rpc-spec"
path = "src/generate_json_rpc_spec.rs"
test = false
