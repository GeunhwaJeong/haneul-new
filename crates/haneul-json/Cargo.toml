[package]
name = "haneul-json"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.57", features = ["backtrace"] }
bcs = "0.1.3"
hex = "0.4.3"
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.79"
schemars = "0.8.8"

haneul-types = { path = "../haneul-types" }
haneul-verifier = { path = "../haneul-verifier" }

move-binary-format = { git = "https://github.com/move-language/move", rev = "c2949bc7967de5b93f0850ce4987fc06c529f9f2" }
move-core-types = { git = "https://github.com/move-language/move", rev = "c2949bc7967de5b93f0850ce4987fc06c529f9f2", features = ["address20"] }
workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
test-fuzz = "3.0.2"

haneul-adapter = { path = "../haneul-adapter" }
haneul-framework = { path = "../haneul-framework" }
