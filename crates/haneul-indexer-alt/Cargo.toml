[package]
name = "haneul-indexer-alt"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[[bin]]
name = "haneul-indexer-alt"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bcs.workspace = true
clap.workspace = true
diesel = { workspace = true, features = ["chrono"] }
diesel-async = { workspace = true, features = ["bb8", "postgres", "async-connection-wrapper"] }
diesel_migrations.workspace = true
futures.workspace = true
itertools.workspace = true
serde.workspace = true
telemetry-subscribers.workspace = true
tokio.workspace = true
tokio-util.workspace = true
toml.workspace = true
tracing.workspace = true

haneul-default-config.workspace = true
haneul-field-count.workspace = true
haneul-indexer-alt-framework.workspace = true
haneul-indexer-alt-schema.workspace = true
haneul-pg-db.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
haneul-synthetic-ingestion = { workspace = true, optional = true }

[dev-dependencies]
rand.workspace = true
tempfile.workspace = true
wiremock.workspace = true

[features]
default = []
benchmark = ["haneul-synthetic-ingestion"]  # This will be used to enable benchmark mode
