[package]
name = "haneul-protocol-config"
version = "0.1.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
workspace-hack = { version = "0.1", path = "../workspace-hack" }
serde = { version = "1.0.144", features = ["derive"] }
tracing = "0.1.36"
serde_with = "2.1.0"
haneul-protocol-config-macros = { path = "../haneul-protocol-config-macros" }
schemars = { version = "0.8.10", features = ["either"] }

[dev-dependencies]
insta = { version = "1.21.1", features = ["redactions", "yaml"] }
