[package]
name = "haneul-faucet"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
async-trait = "0.1.57"
axum = "0.5.13"
clap = { version = "3.1.17", features = ["derive"] }
thiserror = "1.0.31"
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
serde = { version = "1.0.141", features = ["derive"] }
tower = { version = "0.4.12", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.3.4", features = ["cors"] }
http = { version = "0.2.8" }

uuid = {version = "1.1.2", features = [ "v4", "fast-rng"]}

haneul = { path = "../haneul" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-config = { path = "../haneul-config" }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "a4c2cae59d823533061a5d8fe28771629819c43f" }
workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
test-utils = { path = "../test-utils" }

[[bin]]
name = "haneul-faucet"
path = "src/main.rs"
