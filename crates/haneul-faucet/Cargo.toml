[package]
name = "haneul-faucet"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
async-trait = "0.1.53"
axum = "0.5.6"
clap = { version = "3.1.17", features = ["derive"] }
thiserror = "1.0.31"
tokio = { version = "1.18.2", features = ["full"] }
tracing = "0.1.34"
serde = { version = "1.0.137", features = ["derive"] }
tower = { version = "0.4.12", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.3.4", features = ["cors"] }
http = { version = "0.2.8" }

haneul = { path = "../haneul" }
haneul-json-rpc-api = { path = "../haneul-json-rpc-api" }
haneul-types = { path = "../haneul-types" }
haneul-config = { path = "../haneul-config" }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "94d7da89f6a52d7f60a9802b0a03147a9c89c3e4" }

workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
test-utils = { path = "../test-utils" }

[[bin]]
name = "haneul-faucet"
path = "src/main.rs"
