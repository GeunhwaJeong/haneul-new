[package]
name = "haneul-faucet"
version.workspace = true
edition = "2021"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
async-trait = "0.1.57"
axum = "0.5.16"
clap = { version = "3.2.17", features = ["derive"] }
thiserror = "1.0.34"
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
serde = { version = "1.0.144", features = ["derive"] }
tower = { version = "0.4.12", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.3.4", features = ["cors"] }
http = { version = "0.2.8" }
futures = "0.3.23"
uuid = {version = "1.1.2", features = [ "v4", "fast-rng"]}
prometheus = "0.13.2"
scopeguard = "1.1"
tap = "1.0"

haneul = { path = "../haneul" }
haneul-node = { path = "../haneul-node" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-config = { path = "../haneul-config" }
haneul-keys = { path = "../haneul-keys" }
haneul-metrics = { path = "../../crates/haneul-metrics" }
telemetry-subscribers = { path = "../../crates/telemetry-subscribers" }

workspace-hack.workspace = true

[dev-dependencies]
test-utils = { path = "../test-utils" }

[[bin]]
name = "haneul-faucet"
path = "src/main.rs"
