[package]
name = "haneul-light-client"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(msim)',
] }

[lib]
path = "src/lib.rs"

[[bin]]
name = "haneul-light-client"
path = "src/main.rs"

