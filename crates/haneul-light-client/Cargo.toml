clap.workspace = true
move-core-types.workspace = true
haneullabs-common.workspace = true
haneullabs-metrics.workspace = true
roaring.workspace = true
serde.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-stream.workspace = true
futures.workspace = true
serde_yaml.workspace = true
serde_json.workspace = true
haneul-data-ingestion-core.workspace = true
haneul-types.workspace = true
haneul-config.workspace = true
haneul-rpc-api.workspace = true
haneul-rpc.workspace = true
move-binary-format.workspace = true
haneul-package-resolver.workspace = true
haneul-storage.workspace = true
url.workspace = true
reqwest.workspace = true
tracing.workspace = true
object_store.workspace = true
env_logger = "0.11.5"
log = "0.4.22"
