[package]
name = "haneul-json-rpc-types"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
async-trait = "0.1.57"
anyhow = "1.0.58"
schemars = { version = "0.8.10", features = ["either"] }
serde = { version = "1.0.140", features = ["derive"] }
serde_json = "1.0.80"
serde_with = { version = "1.14.0", features = ["hex"] }
colored = "2.0.0"
either = "1.7.0"
itertools = "0.10.3"
tracing = "0.1.35"

move-core-types = { git = "https://github.com/move-language/move", rev = "79071528524f08b12e9abb84c1094d8e976aa17a", features = ["address20"] }
move-bytecode-utils = { git = "https://github.com/move-language/move", rev = "79071528524f08b12e9abb84c1094d8e976aa17a" }

haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
workspace-hack = { path = "../workspace-hack"}
