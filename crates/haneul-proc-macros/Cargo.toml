[package]
name = "haneul-proc-macros"
version = "0.7.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = "1.0.104"
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[target.'cfg(msim)'.dependencies]
msim-macros = { git = "https://github.com/GeunhwaJeong/mysten-sim.git", rev = "bef88159c02fae45d94739f4d380efebf86b2958", package = "msim-macros" }
