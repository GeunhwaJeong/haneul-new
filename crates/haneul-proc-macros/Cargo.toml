[package]
name = "haneul-proc-macros"
version = "0.7.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[lib]
proc-macro = true

[dependencies]
quote = "1"
syn = { version = "2", features = ["full", "fold", "extra-traits"] }
workspace-hack = { version = "0.1", path = "../workspace-hack" }
proc-macro2 = "1"
haneul-enum-compat-util = { path = "../haneul-enum-compat-util" }

[target.'cfg(msim)'.dependencies]
msim-macros = { git = "https://github.com/GeunhwaJeong/mysten-sim.git", rev = "5fdd0c5547fa656143eab43fa570893b88d3620f", package = "msim-macros" }
