[package]
name = "transaction-fuzzer"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Tool to fuzz the system with randomly generated transactions"
license = "Apache-2.0"
publish = false

[dependencies]
workspace-hack = { version = "0.1", path = "../workspace-hack" }
proptest = "1.1.0"
proptest-derive = "0.3.0"
rand = "0.8.5"
move-core-types.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing = "0.1.36"

haneul-core = { path = "../haneul-core" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-types = { path = "../haneul-types", features = ["fuzzing"] }


[dev-dependencies]
haneul-core = { path = "../haneul-core", features = ["test-utils"] }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-types = { path = "../haneul-types", features = ["test-utils"] }
