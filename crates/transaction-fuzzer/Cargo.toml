[package]
name = "transaction-fuzzer"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Tool to fuzz the system with randomly generated transactions"
license = "Apache-2.0"
publish = false

[dependencies]
workspace-hack = { version = "0.1", path = "../workspace-hack" }
proptest.workspace = true
proptest-derive.workspace = true
rand.workspace = true
move-core-types.workspace = true
move-binary-format.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true

haneul-adapter = { path = "../../haneul-execution/latest/haneul-adapter", package = "haneul-adapter-latest" }

test-utils.workspace = true
once_cell.workspace = true
haneul-core.workspace = true
haneul-protocol-config.workspace = true
haneul-types = { workspace = true, features = ["fuzzing"] }
haneul-move-build.workspace = true


[dev-dependencies]
haneul-core = { workspace = true, features = ["test-utils"] }
haneul-protocol-config.workspace = true
haneul-types = { workspace = true, features = ["test-utils"] }
