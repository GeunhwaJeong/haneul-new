[package]
name = "haneul-cluster-test"
version = "0.1.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
futures = "0.3.21"
serde_json = "1.0.80"
tempfile = "3.3.0"
tokio = { version = "1.17.0", features = ["full"] }
async-trait = "0.1.53"
serde_with = { version = "1.13.0", features = ["hex"] }
tracing = { version = "0.1.34", features = ["log"] }
clap = { version = "3.1.14", features = ["derive"] }
reqwest = { version = "0.11.10", features = ["blocking", "json"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "988cad6aaafac84d52a93227a16867bf27c1ea4c" }

haneul-faucet = { path = "../haneul-faucet" }
haneul = { path = "../haneul" }
haneul-core = { path = "../haneul-core" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
workspace-hack = { path = "../workspace-hack"}