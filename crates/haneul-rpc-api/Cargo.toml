[package]
name = "haneul-rpc-api"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(msim)',
  'cfg(fail_points)',
] }

[dependencies]
anyhow.workspace = true
axum = { workspace = true, features = ["matched-path"] }
bcs.workspace = true
rand.workspace = true
roaring.workspace = true
serde.workspace = true
serde_json.workspace = true
haneul-config.workspace = true
tap.workspace = true
tokio.workspace = true
tokio-util.workspace = true
async-trait.workspace = true
itertools.workspace = true
haneul-sdk-types.workspace = true
haneul-rpc.workspace = true
haneul-crypto.workspace = true
prometheus.workspace = true
http.workspace = true
tower.workspace = true
tracing.workspace = true
async-stream.workspace = true
futures.workspace = true

haneul-name-service.workspace = true
fastcrypto.workspace = true
haneul-inverted-index.workspace = true
haneul-rpc-cursor.workspace = true
haneul-types.workspace = true
haneul-macros.workspace = true
haneullabs-common.workspace = true
haneullabs-network.workspace = true
haneul-protocol-config.workspace = true
haneul-package-resolver.workspace = true
move-binary-format.workspace = true
move-core-types.workspace = true
haneul-transaction-builder.workspace = true
haneul-transaction-checks.workspace = true
haneul-display.workspace = true

# dependencies for the protobuf definitions
tonic.workspace = true
tonic-prost.workspace = true
prost.workspace = true
prost-types = "0.14.1"
bytes.workspace = true

tonic-health.workspace = true
tonic-reflection.workspace = true
tonic-web.workspace = true

[dev-dependencies]
# `test-util` enables `#[tokio::test(start_paused = true)]` for the
# virtual-time deadline tests in `grpc::deadline`.
tokio = { workspace = true, features = ["test-util"] }

