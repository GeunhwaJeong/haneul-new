[package]
name = "haneul-framework"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Move framework for haneul platform"
license = "Apache-2.0"
publish = false

[dependencies]
better_any = "0.1.1"
bcs = "0.1.4"
linked-hash-map = "0.5.6"
serde = { version = "1.0.144", features = ["derive"] }
smallvec = "1.9.0"
once_cell = "1.16"
tracing = "0.1.36"

fastcrypto.workspace = true
fastcrypto-zkp.workspace = true

haneul-types = { path = "../haneul-types" }

move-binary-format.workspace = true
move-core-types.workspace = true
move-stdlib.workspace = true
move-vm-runtime.workspace = true
move-vm-types.workspace = true
haneul-protocol-config = { path = "../haneul-protocol-config" }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[build-dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
bcs = "0.1.4"

haneul-framework-build = { path = "../haneul-framework-build" }

move-binary-format.workspace = true
move-package.workspace = true
