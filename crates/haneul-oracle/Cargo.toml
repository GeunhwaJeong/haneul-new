[package]
name = "haneul-oracle"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
clap.workspace = true
prometheus = "0.13.3"
tokio = { workspace = true, features = ["full"] }
tracing = "0.1.36"
once_cell.workspace = true
reqwest = { version = "0.11.13", default_features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.144", features = ["derive", "rc"] }
serde_json = { version = "1.0.1" }
jsonpath_lib = "0.3.0"
chrono.workspace = true
tap.workspace = true
bcs.workspace = true

haneul-config = { path = "../haneul-config" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-sdk = { path = "../haneul-sdk" }
haneul-types = { path = "../haneul-types" }
haneullabs-metrics = { path = "../haneullabs-metrics" }
telemetry-subscribers.workspace = true
workspace-hack.workspace = true

[dev-dependencies]
haneul-keys = { path = "../haneul-keys" }
haneul-move-build = { path = "../haneul-move-build" }
shared-crypto = { path = "../shared-crypto" }
bcs = "0.1.5"
rand = "0.8.5"
dirs = "4.0.0"
