[package]
name = "haneul-network"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
async-trait = "0.1.53"
tonic = "0.7"

haneul-types = { path = "../haneul-types" }

haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "bdaf6ee818497e6772f3000f938f1e5710f6890f" }
workspace-hack = { path = "../workspace-hack"}

[build-dependencies]
tonic-build = { git = "https://github.com/hyperium/tonic.git", rev = "de2e4ac077c076736dc451f3415ea7da1a61a560", default-features = false, features = [ "transport" ] }
