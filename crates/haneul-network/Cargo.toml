[package]
name = "haneul-network"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
bytes = "1.1.0"
async-trait = "0.1.53"
tokio = { version = "1.18.2", features = ["full"] }
tracing = "0.1.34"
tonic = "0.7"
prost = "0.10"
bincode = "1.3.3"
serde = "1.0.136"
haneul-types = { path = "../haneul-types" }

haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "94d7da89f6a52d7f60a9802b0a03147a9c89c3e4" }
workspace-hack = { path = "../workspace-hack"}

[build-dependencies]
tonic-build = { git = "https://github.com/hyperium/tonic.git", rev = "de2e4ac077c076736dc451f3415ea7da1a61a560", default-features = false, features = [ "transport" ] }
