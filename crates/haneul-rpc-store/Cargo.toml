[package]
name = "haneul-rpc-store"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bcs.workspace = true
bytes.workspace = true
fdlimit.workspace = true
move-core-types.workspace = true
prometheus.workspace = true
prost.workspace = true
roaring.workspace = true
rocksdb = { version = "0.22.0", default-features = false, features = ["snappy", "lz4", "zstd", "zlib", "multi-threaded-cf"] }
serde.workspace = true
haneul-consistent-store.workspace = true
haneul-default-config.workspace = true
haneul-execution.workspace = true
haneul-futures.workspace = true
haneul-indexer-alt-framework = { workspace = true, default-features = false }
haneul-inverted-index.workspace = true
haneul-indexer-alt-framework-store-traits.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["time", "rt"] }
tracing.workspace = true
typed-store-error.workspace = true

[dev-dependencies]
futures.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
