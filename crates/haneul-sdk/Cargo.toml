[package]
name = "haneul-sdk"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = "1.0.64"
async-trait = "0.1.61"
clap = { version = "3.2.17", features = ["derive"] }
colored = "2.0.0"
jsonrpsee = { version = "0.16.2", features = ["http-client"] }
serde = { version = "1.0.144", features = ["derive"] }
serde_with = { version = "2.1.0", features = ["hex"] }
serde_json = "1.0.88"
futures-core = "0.3.21"
futures = "0.3.23"
tokio = { workspace = true }
bcs = "0.1.4"
thiserror = "1.0.37"

haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-test-transaction-builder = { path = "../haneul-test-transaction-builder" }
haneul-transaction-builder = { path = "../haneul-transaction-builder" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-keys = { path = "../haneul-keys" }
haneul-config = { path = "../haneul-config" }
shared-crypto = { path = "../shared-crypto" }
tracing = "0.1.36"

move-core-types.workspace = true

fastcrypto.workspace = true

workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
clap = { version = "3.2.17", features = ["derive"] }
dirs = "4.0.0"
async-recursion = "1.0.0"
tempfile = "3.3.0"
test-utils = { path = "../test-utils" }
futures-core = "0.3.21"
futures = "0.3.23"
haneul = { path = "../haneul" }

[[example]]
name = "tic-tac-toe"
path = "examples/tic_tac_toe.rs"
test = false
