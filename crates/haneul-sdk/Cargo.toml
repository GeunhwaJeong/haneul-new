[package]
name = "haneul-sdk"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = "1.0.58"
async-trait = "0.1.57"
jsonrpsee = { version = "0.15.1", features = ["full"] }
serde = { version = "1.0.141", features = ["derive"] }
serde_json = "1.0.83"
futures-core = "0.3.21"
futures = "0.3.21"
signature = "1.6.0"
rand = "0.7.3"

bip39 = { git = "https://github.com/patrickkuo/rust-bip39.git" , rev = "a76fe8310416555e6383b42b8acc4eb93c7bcc89", features = ["rand"]}

haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }

workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
clap = { version = "3.1.17", features = ["derive"] }
dirs = "4.0.0"
tokio = "1.20.1"
bcs = "0.1.3"
async-recursion = "1.0.0"
tempfile = "3.3.0"
sha3 = "0.10.2"

[[example]]
name = "tic-tac-toe"
path = "examples/tic_tac_toe.rs"
test = false