[package]
name = "haneul-sdk"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = "1.0.64"
async-trait = "0.1.61"
jsonrpsee = { git="https://github.com/patrickkuo/jsonrpsee.git", rev= "adc19a124ed7045744442ca67f084ddfba4ba177", features = ["http-client"] }
serde = { version = "1.0.144", features = ["derive"] }
serde_json = "1.0.88"
futures-core = "0.3.21"
futures = "0.3.23"
tokio = { workspace = true }
rand = "0.8.5"
bcs = "0.1.4"
thiserror = "1.0.37"

haneul-adapter = { path = "../haneul-adapter" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-transaction-builder = { path = "../haneul-transaction-builder" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-config = { path = "../haneul-config" }
haneul-keys =  { path = "../haneul-keys" }

move-core-types.workspace = true
move-bytecode-utils.workspace = true
move-binary-format.workspace = true
fastcrypto.workspace = true

workspace-hack= { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
clap = { version = "3.2.17", features = ["derive"] }
dirs = "4.0.0"
async-recursion = "1.0.0"
tempfile = "3.3.0"
fastcrypto.workspace = true
test-utils = { path = "../test-utils" }
futures-core = "0.3.21"
futures = "0.3.23"
haneul =  { path = "../haneul" }

[[example]]
name = "tic-tac-toe"
path = "examples/tic_tac_toe.rs"
test = false
