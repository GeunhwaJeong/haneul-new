[package]
name = "haneul-benchmark"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
async-trait = "0.1.57"
rayon = "1.5.3"
anyhow = { version = "1.0.64", features = ["backtrace"] }
futures = "0.3.23"
serde = { version = "1.0.144", features = ["derive"] }
serde_json = "1.0.83"
tempfile = "3.3.0"
tokio = { version = "1.20.1", features = ["full"] }
strum = "0.24.1"
strum_macros = "0.24.3"
num_cpus = "1.13.1"
rocksdb = "0.19.0"
serde_with = { version = "1.14.0", features = ["hex"] }
tracing = "0.1.36"
tracing-subscriber = { version = "0.3.15", features = ["time", "registry", "env-filter"] }
telemetry-subscribers = "0.1.0"
clap = { version = "3.1.17", features = ["derive"] }
prometheus = "0.13.1"
multiaddr = "0.14.0"
crossterm = "0.23.2"
rand = "0.8.5"
base64 = "0.13.0"
rand_distr = "0.4.3"

bcs = "0.1.3"
haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-sdk = { path = "../haneul-sdk" }
haneul-quorum-driver = { path = "../haneul-quorum-driver" }
haneul-node = { path = "../haneul-node" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }

move-core-types = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e", features = ["address20"] }
narwhal-node = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "node" }
workspace-hack = { path = "../workspace-hack"}
test-utils = { path = "../test-utils" }

[target.'cfg(not(target_env = "msvc"))'.dependencies]
jemallocator = { version = "^0.5", features = ["profiling"] }
jemalloc-ctl = "^0.5"

[features]
benchmark = ["narwhal-node/benchmark"]
