[package]
name = "haneul-rpc-loadgen"
version.workspace = true
edition = "2021"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false

[dependencies]
rand = "0.8.4"
anyhow = { version = "1.0.64", features = ["backtrace"] }
async-trait = "0.1.61"
axum = { version = "0.6.2", features = ["json"] }
clap = { version = "3.2.17", features = ["derive"] }
thiserror = "1.0.34"
tokio = { workspace = true, features = ["full"] }
tracing = "0.1.36"
serde = { version = "1.0.144", features = ["derive"] }
tower = { version = "0.4.12", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.3.4", features = ["cors"] }
tonic = "0.8"
http = { version = "0.2.8" }
futures = "0.3.23"
uuid = {version = "1.1.2", features = [ "v4", "fast-rng"]}
prometheus = "0.13.3"
scopeguard = "1.1"
tap = "1.0"
tracing-subscriber = { version = "0.3.15" }
dirs = "4.0.0"

eyre = "0.6.8"
rocksdb = "0.20.1"
tempfile = "3.3.0"

haneul = { path = "../haneul" }
haneul-node = { path = "../haneul-node" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-types = { path = "../haneul-types" }
haneul-config = { path = "../haneul-config" }
haneul-keys = { path = "../haneul-keys" }
haneul-sdk = { path = "../haneul-sdk" }
haneullabs-metrics = { path = "../../crates/haneullabs-metrics" }
telemetry-subscribers.workspace = true
typed-store.workspace = true
typed-store-derive.workspace = true
shared-crypto = { path = "../shared-crypto" }

workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
test-utils = { path = "../test-utils" }


[[bin]]
name = "haneul-rpc-loadgen"
path = "src/main.rs"
