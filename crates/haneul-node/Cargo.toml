[package]
name = "haneul-node"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.57", features = ["backtrace"] }
clap = { version = "3.1.17", features = ["derive"] }
multiaddr = "0.14.0"
prometheus_exporter = "0.8.4"
tokio = { version = "1.18.2", features = ["full"] }
tracing = "0.1.34"

haneul-config = { path = "../haneul-config" }
haneul_core = { path = "../../haneul_core" }

telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7c247967e5a5abd59ecaa75bc62b05bcdf4503fe" }
