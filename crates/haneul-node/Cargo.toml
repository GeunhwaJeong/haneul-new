[package]
name = "haneul-node"
version = "0.6.2"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
axum = "0.5.13"
anyhow = { version = "1.0.58", features = ["backtrace"] }
clap = { version = "3.1.17", features = ["derive"] }
multiaddr = "0.14.0"
prometheus = "0.13.1"
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
parking_lot = "0.12.1"
futures = "0.3.21"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d965a5a795dcdb4d1c7964acf556bc249fdc58aa"}

haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-storage = { path = "../haneul-storage" }
haneul-network = { path = "../haneul-network" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-telemetry = { path = "../haneul-telemetry" }
haneul-types = { path = "../haneul-types" }

telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d965a5a795dcdb4d1c7964acf556bc249fdc58aa" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d965a5a795dcdb4d1c7964acf556bc249fdc58aa" }
workspace-hack = { path = "../workspace-hack"}

[target.'cfg(not(target_env = "msvc"))'.dependencies]
jemallocator = { version = "^0.5", features = ["profiling"] }
jemalloc-ctl = "^0.5"
