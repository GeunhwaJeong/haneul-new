[package]
name = "haneul-node"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anemo.workspace = true
anemo-tower.workspace = true
arc-swap = "1.5.1"
axum = "0.6.2"
anyhow = { version = "1.0.64", features = ["backtrace"] }
clap = { version = "3.2.17", features = ["derive"] }
multiaddr = "0.17.0"
prometheus = "0.13.3"
tokio = { workspace = true, features = ["full"] }
tracing = "0.1.36"
parking_lot = "0.12.1"
futures = "0.3.23"
chrono = "0.4.23"
tower = "0.4.13"
git-version = "0.3.5"
const-str = "0.5.3"

haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-storage = { path = "../haneul-storage" }
haneul-network = { path = "../haneul-network" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-protocol-constants = { path = "../haneul-protocol-constants" }
haneul-telemetry = { path = "../haneul-telemetry" }
haneul-types = { path = "../haneul-types" }
haneullabs-metrics = { path = "../haneullabs-metrics" }
narwhal-network = { path = "../../narwhal/network" }
narwhal-types = { path = "../../narwhal/types" }
narwhal-config = { path = "../../narwhal/config" }
typed-store.workspace = true
haneullabs-network.workspace = true
telemetry-subscribers.workspace = true
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
reqwest = { version = "0.11.13", features = ["blocking", "json"] }

[target.'cfg(msim)'.dependencies]
haneul-simulator = { path = "../haneul-simulator" }
