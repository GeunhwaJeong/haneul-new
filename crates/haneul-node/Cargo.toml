[package]
name = "haneul-node"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.57", features = ["backtrace"] }
clap = { version = "3.1.17", features = ["derive"] }
multiaddr = "0.14.0"
prometheus_exporter = "0.8.4"
tokio = { version = "1.18.2", features = ["full"] }
tracing = "0.1.34"
parking_lot = "0.12.1"
futures = "0.3.21"
jsonrpsee = { version = "0.13.1", features = ["full"] }
jsonrpsee-core = "0.13.1"
async-trait = "0.1.53"

haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-storage = { path = "../haneul-storage" }
haneul-network = { path = "../haneul-network" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-open-rpc = { path = "../haneul-open-rpc" }
haneul-types = { path = "../haneul-types" }

telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "ff5c1d69057fe93be658377462ca2875a57a0223" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "ff5c1d69057fe93be658377462ca2875a57a0223" }
workspace-hack = { path = "../workspace-hack"}
