[package]
name = "haneul-storage"
version = "0.1.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = "1.0.55"
fdlimit = "0.2.1"
futures = "0.3.21"
flexstr = "^0.9"
serde = { version = "1.0.136", features = ["derive"] }
tokio = { version = "1.17.0", features = ["full", "tracing"] }
rocksdb = "0.18.0"
tracing = "0.1.34"

haneul-types = { path = "../haneul-types" }

typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "988cad6aaafac84d52a93227a16867bf27c1ea4c"}
workspace-hack = { path = "../workspace-hack"}

move-core-types = { git = "https://github.com/move-language/move", rev = "1b2d3b4274345f5b4b6a1a1bde5aee452003ab5b", features = ["address20"] }

[dev-dependencies]
pretty_assertions = "1.2.0"
tracing-subscriber = "0.3.9"
