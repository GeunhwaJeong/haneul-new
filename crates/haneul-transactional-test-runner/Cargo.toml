[package]
name = "haneul-transactional-test-runner"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Move framework for Haneul platform"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0.64"
bcs = "0.1.4"
bimap = "0.6.2"
clap = { version = "3.1.8", features = ["derive"] }
once_cell = "1.16"
rand = "0.8.5"
prometheus = "0.13.3"
tempfile = "3.2.0"

fastcrypto.workspace = true
move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-command-line-common.workspace = true
move-compiler.workspace = true
move-core-types.workspace = true
move-stdlib.workspace = true
move-symbol-pool.workspace = true
move-transactional-test-runner.workspace = true
move-vm-runtime.workspace = true

haneul-adapter = { path = "../../haneul-execution/latest/haneul-adapter", package = "haneul-adapter-latest" }
haneul-move-natives = { path = "../../haneul-execution/latest/haneul-move-natives", package = "haneul-move-natives-latest" }

haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-types = { path = "../haneul-types", features = ["test-utils"]}
workspace-hack = { version = "0.1", path = "../workspace-hack" }
