[package]
name = "haneul-transactional-test-runner"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Move framework for Haneul platform"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0.64"
bcs = "0.1.4"
bimap = "0.6.2"
clap = { version = "3.1.8", features = ["derive"] }
once_cell = "1.16"
rand = "0.8.5"
prometheus = "0.13.3"
tempfile = "3.2.0"
async-trait = "0.1.61"
tokio = "1.27.0"

fastcrypto.workspace = true
move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-command-line-common.workspace = true
move-compiler.workspace = true
move-core-types.workspace = true
move-symbol-pool.workspace = true
move-transactional-test-runner.workspace = true

move-stdlib = { path = "../../external-crates/move/move-stdlib" }
move-vm-runtime = { path = "../../external-crates/move/move-vm/runtime" }
haneul-config = { path = "../haneul-config" }
haneul-swarm-config = { path = "../haneul-swarm-config" }
haneul-core = { path = "../haneul-core", features = ["test-utils"] }
haneul-framework = { path = "../haneul-framework" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-types = { path = "../haneul-types", features = ["test-utils"]}
workspace-hack = { version = "0.1", path = "../workspace-hack" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-json-rpc = { path = "../haneul-json-rpc" }

[target.'cfg(msim)'.dependencies]
msim = { git = "https://github.com/GeunhwaJeong/mysten-sim.git", rev = "bd870b9a11870a2618c55ba703d58fafd41d686c", package = "msim" }
