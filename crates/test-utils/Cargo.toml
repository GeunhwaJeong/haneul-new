[package]
name = "test-utils"
authors = ["Haneul Labs <build@haneul-labs.com>"]
version = "0.1.0"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
futures = "0.3.23"
tempfile = "3.3.0"
tracing = "0.1.36"
signature = "1.6.0"
bcs = "0.1.4"
jsonrpsee-http-client = "0.15.1"
jsonrpsee = { version = "0.15.1", features = ["full"] }
prometheus = "0.13.2"
tokio = { version = "1.20.1", features = ["full", "tracing", "test-util"] }
serde_json = "1.0.83"
rand = "0.8.5"
haneul = { path = "../haneul" }
haneul-adapter = { path = "../haneul-adapter" }
haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-framework-build = { path = "../haneul-framework-build" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-node = { path = "../haneul-node" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-types = { path = "../haneul-types" }
haneul-keys = { path = "../haneul-keys" }
haneul-sdk = { path = "../haneul-sdk" }
once_cell = "1.16"
multiaddr = "0.15.0"

haneullabs-network.workspace = true
move-core-types.workspace = true
workspace-hack.workspace = true

[target.'cfg(msim)'.dependencies]
haneul-simulator = { path = "../haneul-simulator" }
