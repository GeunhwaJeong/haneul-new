[package]
name = "test-utils"
authors = ["Haneul Labs <build@haneul-labs.com>"]
version = "0.1.0"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
futures = "0.3.21"
rand = "0.7.3"
tempfile = "3.3.0"
bcs = "0.1.3"
jsonrpsee-http-server = "0.14.0"
jsonrpsee-http-client = "0.14.0"
prometheus = "0.13.1"

haneul = { path = "../haneul" }
haneul-adapter = { path = "../haneul-adapter" }
haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-gateway = { path = "../haneul-gateway" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-api = { path = "../haneul-json-rpc-api" }
haneul-node = { path = "../haneul-node" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-types = { path = "../haneul-types" }

move-package = { git = "https://github.com/move-language/move", rev = "7abcc9b03b25bb6ceb9ac68c2f7bdd5710e13003" }
move-core-types = { git = "https://github.com/move-language/move", rev = "7abcc9b03b25bb6ceb9ac68c2f7bdd5710e13003", features = ["address20"] }
workspace-hack = { path = "../workspace-hack"}
