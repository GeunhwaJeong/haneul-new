[package]
name = "test-utils"
authors = ["Haneul Labs <build@haneul-labs.com>"]
version = "0.1.0"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
futures = "0.3.23"
tempfile = "3.3.0"
tracing = "0.1.36"
bcs = "0.1.4"
jsonrpsee = { git="https://github.com/wlmyng/jsonrpsee.git", rev= "b1b300784795f6a64d0fcdf8f03081a9bc38bde8", features = ["http-client"] }
prometheus = "0.13.3"
tokio = { workspace = true, features = ["full", "tracing", "test-util"] }
serde_json = "1.0.88"
rand = "0.8.5"
haneul = { path = "../haneul" }
haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core", features = ["test-utils"] }
haneul-framework = { path = "../haneul-framework" }
haneul-swarm-config = { path = "../haneul-swarm-config" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-move-build = { path = "../haneul-move-build" }
haneul-node = { path = "../haneul-node" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-types = { path = "../haneul-types", features = ["test-utils"] }
haneul-keys = { path = "../haneul-keys" }
haneul-sdk = { path = "../haneul-sdk" }
haneul-test-transaction-builder = { path = "../haneul-test-transaction-builder" }
haneullabs-metrics = { path = "../haneullabs-metrics"}
shared-crypto = { path = "../shared-crypto" }

move-binary-format.workspace = true
move-core-types.workspace = true
move-package.workspace = true
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[target.'cfg(msim)'.dependencies]
haneul-simulator = { path = "../haneul-simulator" }

[dev-dependencies]
haneul-macros = { path = "../haneul-macros" }
