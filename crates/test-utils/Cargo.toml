[package]
name = "test-utils"
authors = ["Haneul Labs <build@haneul-labs.com>"]
version = "0.1.0"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
futures = "0.3.23"
tempfile = "3.3.0"
tracing = "0.1.36"
bcs = "0.1.3"
jsonrpsee-http-client = "0.15.1"
prometheus = "0.13.1"
tokio = { version = "1.20.1", features = ["full", "tracing", "test-util"] }
serde_json = "1.0.83"
rand = "0.8.5"
haneul = { path = "../haneul" }
haneul-adapter = { path = "../haneul-adapter" }
haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-node = { path = "../haneul-node" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-types = { path = "../haneul-types" }
haneul-sdk = { path = "../haneul-sdk" }
once_cell = "1.13.1"

move-package = { git = "https://github.com/move-language/move", rev = "79071528524f08b12e9abb84c1094d8e976aa17a" }
move-core-types = { git = "https://github.com/move-language/move", rev = "79071528524f08b12e9abb84c1094d8e976aa17a", features = ["address20"] }
workspace-hack = { path = "../workspace-hack"}
