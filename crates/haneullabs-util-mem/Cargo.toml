[package]
name = "haneullabs-util-mem"
version = "0.11.0"
authors = ["Parity Technologies <admin@parity.io>", "Andrew Schran <aschran@haneul-labs.com>"]
repository = "https://github.com/GeunhwaJeong/haneullabs-infra"
description = "Collection of memory related utilities"
license = "MIT OR Apache-2.0"
edition = "2021"
rust-version = "1.56.1"
publish = false

[dependencies]
cfg-if = "1.0.0"
hashbrown = { version = "0.12", optional = true }
haneullabs-util-mem-derive = { path = "../haneullabs-util-mem-derive", version = "0.1" }
impl-trait-for-tuples = "0.2.0"
fastcrypto = { workspace = true }
indexmap = { version = "1.9.1", features = ["serde"] }
roaring = "0.10.0"
ed25519-consensus = { version = "2.0.1", features = ["serde"] }
workspace-hack.workspace = true

smallvec = { version = "1.10.0", optional = true }
parking_lot = { version = "0.12.0", optional = true }
once_cell = "1.16.0"

[features]
default = ["std", "hashbrown", "smallvec", "estimate-heapsize"]
std = ["parking_lot"]
# Full estimate: no call to allocator
estimate-heapsize = []
