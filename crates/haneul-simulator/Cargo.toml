[package]
name = "haneul-simulator"
version = "0.7.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
workspace-hack = { version = "0.1", path = "../workspace-hack" }
move-package.workspace = true
haneul-framework = { path = "../haneul-framework" }
haneul-framework-build = { path = "../haneul-framework-build" }
haneul-types = { path = "../haneul-types" }
tempfile = "3.3.0"
tracing = "0.1"
anemo.workspace = true
anemo-tower.workspace = true
narwhal-network = { path = "../../narwhal/network" }
fastcrypto = { workspace = true, features = ["copy_key"] }
telemetry-subscribers.workspace = true
tower = "0.4.13"
lru = "0.10"

[target.'cfg(msim)'.dependencies]
msim = { git = "https://github.com/GeunhwaJeong/mysten-sim.git", rev = "8190dcd907e45755d48ab14992f8df5ac31dacc9", package = "msim" }
