[package]
name = "haneul-simulator"
version = "0.7.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
workspace-hack.workspace = true
haneul-framework = { path = "../haneul-framework" }
haneul-types = { path = "../haneul-types" }
tracing = "0.1"
anemo.workspace = true
fastcrypto = { workspace = true, features = ["copy_key"] }
telemetry-subscribers = { path = "../../crates/telemetry-subscribers" }

[target.'cfg(msim)'.dependencies]
msim = { git = "https://github.com/GeunhwaJeong/mysten-sim.git", rev = "b28d77f88434535b166cc60bd3e5018aa75cd705", package = "msim" }
