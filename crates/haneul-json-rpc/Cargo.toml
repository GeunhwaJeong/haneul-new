[package]
name = "haneul-json-rpc"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
jsonrpsee = { version = "0.15.1", features = ["full"] }
jsonrpsee-core = "0.15.1"
jsonrpsee-proc-macros = "0.15.1"
move-binary-format = { git = "https://github.com/move-language/move", rev = "70b34a66473c34ad30d101290b249f2db3c847a2" }
move-bytecode-utils = { git = "https://github.com/move-language/move", rev = "70b34a66473c34ad30d101290b249f2db3c847a2" }
move-core-types = { git = "https://github.com/move-language/move", rev = "70b34a66473c34ad30d101290b249f2db3c847a2", features = ["address20"] }
prometheus = "0.13.1"
anyhow = "1.0.64"
tracing = "0.1.36"
async-trait = "0.1.57"
serde = { version = "1.0.144", features = ["derive"] }
futures = "0.3.23"
tokio = { version = "1.20.1", features = ["full"] }
signature = "1.6.0"

haneul-core = { path = "../haneul-core" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-open-rpc = { path = "../haneul-open-rpc" }
haneul-quorum-driver = { path = "../haneul-quorum-driver" }
haneul-open-rpc-macros = { path = "../haneul-open-rpc-macros" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-cost = { path = "../haneul-cost" }
workspace-hack = { path = "../workspace-hack" }
