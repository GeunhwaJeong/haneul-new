[package]
name = "haneul-json-rpc"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
fastcrypto.workspace = true
jsonrpsee = { version = "0.16.2", features = ["full"] }
jsonrpsee-proc-macros = "0.16.2"
hyper = "0.14"
itertools = "0.10.4"
linked-hash-map = "0.5.6"
tower = "0.4.12"
tower-http = { version = "0.3.4", features = ["full"] }
move-binary-format.workspace = true
move-core-types.workspace = true
move-package.workspace = true
move-bytecode-utils.workspace = true
prometheus = "0.13.3"
anyhow = "1.0.64"
tracing = "0.1.36"
async-trait = "0.1.61"
serde = { version = "1.0.144", features = ["derive"] }
futures = "0.3.23"
tokio = { workspace = true, features = ["full"] }
signature = "1.6.0"
thiserror = "1.0.37"
bcs = "0.1.4"
eyre = "0.6.8"
num_cpus = "1.15.0"
once_cell = "1.16"

tap = "1.0"

haneul-core = { path = "../haneul-core" }
haneul-swarm-config = { path = "../haneul-swarm-config" }
haneul-storage = {path = "../haneul-storage" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-open-rpc = { path = "../haneul-open-rpc" }
haneul-open-rpc-macros = { path = "../haneul-open-rpc-macros" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-transaction-builder = { path = "../haneul-transaction-builder" }
haneullabs-metrics = { path = "../haneullabs-metrics" }
workspace-hack = { version = "0.1", path = "../workspace-hack" }
shared-crypto = { path = "../shared-crypto" }
typed-store.workspace = true
cached = "0.43.0"

[dev-dependencies]
haneul-config = { path = "../haneul-config" }
haneul-keys = { path = "../haneul-keys" }
haneul-move-build = { path = "../haneul-move-build" }
test-utils = { path = "../test-utils" }
haneul-sdk = { path = "../haneul-sdk" }
rand = "0.8.5"
haneul-macros = { path = "../haneul-macros" }
haneul-simulator = { path = "../haneul-simulator" }
reqwest = { version = "0.11.13", default_features = false, features = ["rustls-tls"] }
