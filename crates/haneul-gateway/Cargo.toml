[package]
name = "haneul-gateway"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.57", features = ["backtrace"] }
async-trait = "0.1.53"
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.80"
serde_with = { version = "1.14.0", features = ["hex"] }
schemars = "0.8.8"
jsonrpsee = { version = "0.13.1", features = ["full"] }
jsonrpsee-proc-macros = "0.13.1"
jsonrpsee-core = "0.13.1"
tracing = "0.1.34"
tokio = { version = "1.18.2", features = ["full"] }
tokio-stream = "0.1.8"
futures = "0.3.21"
ed25519-dalek = { version = "1.0.1", features = ["batch", "serde"] }
prometheus_exporter = "0.8.4"
strum = "0.24.0"
strum_macros = "0.24.0"
once_cell = "1.11.0"

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-json-rpc-api = { path = "../haneul-json-rpc-api" }
haneul-open-rpc = { path = "../haneul-open-rpc" }

move-core-types = { git = "https://github.com/move-language/move", rev = "c2949bc7967de5b93f0850ce4987fc06c529f9f2", features = ["address20"] }
move-bytecode-utils = { git = "https://github.com/move-language/move", rev = "c2949bc7967de5b93f0850ce4987fc06c529f9f2" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "ff5c1d69057fe93be658377462ca2875a57a0223" }
workspace-hack = { path = "../workspace-hack"}
