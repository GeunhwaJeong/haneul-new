[package]
name = "haneul-gateway"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.57", features = ["backtrace"] }
async-trait = "0.1.53"
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.80"
serde_with = { version = "1.13.0", features = ["hex"] }
schemars = "0.8.8"
jsonrpsee = { version = "0.13.1", features = ["full"] }
jsonrpsee-proc-macros = "0.13.1"
jsonrpsee-core = "0.13.1"
tracing = "0.1.34"
tokio = { version = "1.18.2", features = ["full"] }
futures = "0.3.21"
ed25519-dalek = { version = "1.0.1", features = ["batch", "serde"] }

haneul_core = { path = "../../haneul_core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-open-rpc = { path = "../haneul-open-rpc" }
haneul-open-rpc-macros = { path = "../haneul-open-rpc-macros" }

move-core-types = { git = "https://github.com/move-language/move", rev = "1b2d3b4274345f5b4b6a1a1bde5aee452003ab5b", features = ["address20"] }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7c247967e5a5abd59ecaa75bc62b05bcdf4503fe" }
