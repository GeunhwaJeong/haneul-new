[package]
name = "haneul-gateway"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
async-trait = "0.1.57"
serde = { version = "1.0.142", features = ["derive"] }
tracing = "0.1.36"
tokio = { version = "1.20.1", features = ["full"] }
futures = "0.3.21"
prometheus = "0.13.1"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e" }

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-node = { path = "../haneul-node" }

haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e" }
move-package = { git = "https://github.com/move-language/move", rev = "79071528524f08b12e9abb84c1094d8e976aa17a" }
workspace-hack = { path = "../workspace-hack"}

[dev-dependencies]
test-utils = { path = "../test-utils" }
haneul-framework = { path = "../haneul-framework" }
haneul-sdk = { path = "../haneul-sdk" }

[[bin]]
name = "rpc-server"
path = "src/main.rs"
