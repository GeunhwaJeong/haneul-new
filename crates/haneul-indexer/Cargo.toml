[package]
name = "haneul-indexer"
version = "0.0.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"


[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
async-trait = "0.1.61"
backoff = { version = "0.4", features = ["futures", "futures-core", "pin-project-lite", "tokio", "tokio_1"] }
bcs = "0.1.4"
chrono = { version = "0.4.23", features = ["clock", "serde"] }
clap = { version = "3.2.17", features = ["derive"] }
diesel = { version = "2.0.3", features = ["chrono", "postgres", "r2d2", "serde_json"] }
diesel-derive-enum = { version = "2.0.1", features = ["postgres"] }
futures = "0.3.23"
jsonrpsee = { version = "0.16.2", features = ["full"] }
jsonrpsee-proc-macros = "0.16.2"
prometheus = "0.13.3"
rand = "0.8"
serde = { version = "1.0.144", features = ["derive"] }
serde_json = "1.0.83"
thiserror = "1.0.34"
tracing = "0.1.36"
tokio = { workspace = true, features = ["full"] }
tokio-stream = { version = "0.1.8", features = ["sync", "net"] }

fastcrypto = { workspace = true, features = ["copy_key"] }
haneullabs-metrics = { path = "../haneullabs-metrics" }
narwhal-network = { path = "../../narwhal/network" }
haneul-config = { path = "../haneul-config" }
haneul-core = { path = "../haneul-core" }
haneul-json = { path = "../haneul-json" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-keys = { path = "../haneul-keys" }
haneul-node = { path = "../haneul-node" }
haneul-open-rpc = { path = "../haneul-open-rpc" }
haneul-open-rpc-macros = { path = "../haneul-open-rpc-macros" }
haneul-sdk = { path = "../haneul-sdk" }
haneul-types = { path = "../haneul-types" }
workspace-hack = { version = "0.1", path = "../workspace-hack" }
telemetry-subscribers.workspace = true

move-core-types.workspace = true
move-bytecode-utils.workspace = true

[features]
pg_integration = []

[dev-dependencies]
test-utils = { path = "../test-utils" }
haneul-framework-build = { path = "../haneul-framework-build" }
diesel_migrations = "2.0.0"

[[bin]]
name = "haneul-indexer"
path = "src/main.rs"
