[package]
name = "haneullabs-service-boilerplate"
authors = ["Haneul Labs <build@haneul-labs.com>"]
version = "0.0.1"
edition = "2021"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0.79"
axum = { version = "0.7", features = ["macros"] }
haneullabs-service = { git = "https://github.com/GeunhwaJeong/haneul.git", branch = "main", package = "haneullabs-service" }
prometheus = "0.13.3"
tracing = "0.1.40"
serde = { version = "1.0.188", features = ["derive"] }
tokio = { version = "1.32.0", features = ["full"] }
