[package]
name = "haneul-source-validation"
version = "0.1.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
thiserror = "1.0.34"

haneul-types = { path = "../haneul-types" }
haneul-sdk = { path = "../../crates/haneul-sdk" }
haneul-framework = { path = "../../crates/haneul-framework" }
haneul-framework-build = { path = "../../crates/haneul-framework-build" }

move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-bytecode-verifier.workspace = true
move-compiler.workspace = true
move-core-types.workspace = true
move-package.workspace = true
move-symbol-pool.workspace = true
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]

rand = "0.8.5"
tempfile = "3.3.0"
tokio = { version = "1.20.1", features = ["macros", "test-util"] }
tracing = "0.1.36"

haneul = { path = "../haneul" }
test-utils = { path = "../test-utils" }
