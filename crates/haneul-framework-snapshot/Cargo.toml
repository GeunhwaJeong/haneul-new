[package]
name = "haneul-framework-snapshot"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Tool to create a bytecode snapshot of the current haneul-framework"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow.workspace = true
bcs.workspace = true
serde.workspace = true
serde_json.workspace = true
git-version.workspace = true

haneul-framework.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
workspace-hack.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
