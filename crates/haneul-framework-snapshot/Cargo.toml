[package]
name = "haneul-framework-snapshot"
version.workspace = true
edition = "2024"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Tool to create a bytecode snapshot of the current haneul-framework"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow.workspace = true
bcs.workspace = true
serde.workspace = true
serde_json.workspace = true
bin-version.workspace = true

haneul-framework.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
haneul-package-alt.workspace = true
move-package-alt.workspace = true
