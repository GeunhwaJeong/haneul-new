[package]
name = "haneul"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
json_to_table.workspace = true
tabled.workspace = true
anemo.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
signature.workspace = true
camino.workspace = true
tokio = { workspace = true, features = ["full"] }
async-trait.workspace = true
tracing.workspace = true
bcs.workspace = true
clap.workspace = true
bip32.workspace = true
rand.workspace = true
tap.workspace = true
inquire.workspace = true
rusoto_core.workspace = true
rusoto_kms.workspace = true
prometheus.workspace = true
git-version.workspace = true
const-str.workspace = true
num-bigint.workspace = true
regex.workspace = true
reqwest.workspace = true
im.workspace = true

haneul-config.workspace = true
haneul-execution = { path = "../../haneul-execution", features = ["gas-profiler"] }
haneul-swarm-config.workspace = true
haneul-genesis-builder.workspace = true
haneul-types = { workspace = true, features = ["gas-profiler"]}
haneul-json.workspace = true
haneul-swarm.workspace = true
haneul-json-rpc-types.workspace = true
haneul-sdk.workspace = true
haneul-keys.workspace = true
haneul-source-validation.workspace = true
haneul-move = { workspace = true, features = ["all"] }
haneul-move-build.workspace = true
haneul-protocol-config.workspace = true
shared-crypto.workspace = true
haneul-replay.workspace = true

fastcrypto.workspace = true
fastcrypto-zkp.workspace = true

rustyline.workspace = true
rustyline-derive.workspace = true
colored.workspace = true
unescape.workspace = true
shell-words.workspace = true

tempfile.workspace = true
telemetry-subscribers.workspace = true

move-core-types.workspace = true
move-package.workspace = true
csv.workspace = true
workspace-hack.workspace = true

[target.'cfg(not(target_env = "msvc"))'.dependencies]
jemalloc-ctl.workspace = true

[dev-dependencies]
prometheus.workspace = true
fs_extra.workspace = true
expect-test.workspace = true
assert_cmd.workspace = true

test-cluster.workspace = true
haneul-macros.workspace = true
haneul-simulator.workspace = true
haneul-test-transaction-builder.workspace = true

[package.metadata.cargo-udeps.ignore]
normal = ["jemalloc-ctl"]

[[example]]
name = "generate-genesis-checkpoint"
path = "src/generate_genesis_checkpoint.rs"
test = false

[features]
gas-profiler = [
    "haneul-types/gas-profiler",
    "haneul-execution/gas-profiler",
]
