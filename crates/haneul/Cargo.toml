[package]
name = "haneul"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anemo.workspace = true
anyhow = { version = "1.0.64", features = ["backtrace"] }
serde = { version = "1.0.144", features = ["derive"] }
serde_json = "1.0.88"
serde_yaml = "0.8.26"
signature = "1.6.0"
camino = "1.1.1"
tokio = { workspace = true, features = ["full"] }
async-trait = "0.1.61"
serde_with = { version = "2.1.0", features = ["hex"] }
tracing = "0.1.36"
bcs = "0.1.4"
clap = { version = "3.2.17", features = ["derive"] }
bip32 = "0.4.0"
prettytable-rs = "0.10.0"
rand = "0.8.5"
tap = "1.0"
inquire = "0.6.0"
rusoto_core = { version = "0.48.0", default_features=false, features=["rustls"] }
rusoto_kms = { version = "0.48.0", default_features=false, features=["rustls"] }
aws-config = "0.55.1"
prometheus = "0.13.3"
git-version = "0.3.5"
const-str = "0.5.3"

haneul-adapter = { path = "../../haneul-execution/latest/haneul-adapter", package = "haneul-adapter-latest" }

haneul-core = { path = "../haneul-core" }
haneul-framework-snapshot = { path = "../haneul-framework-snapshot" }
haneul-config = { path = "../haneul-config" }
haneul-swarm-config = { path = "../haneul-swarm-config" }
haneul-genesis-builder = { path = "../haneul-genesis-builder" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }
haneul-sdk = { path = "../haneul-sdk" }
haneul-keys = { path = "../haneul-keys" }
haneul-source-validation = { path = "../haneul-source-validation" }
haneul-move = { path = "../haneul-move", features = ["all"] }
haneul-move-build = { path = "../haneul-move-build" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-test-transaction-builder = { path = "../haneul-test-transaction-builder" }
haneul-verifier = { path = "../../haneul-execution/latest/haneul-verifier", package = "haneul-verifier-latest" }
shared-crypto = { path = "../shared-crypto" }

fastcrypto.workspace = true

rustyline = "9.1.2"
rustyline-derive = "0.7.0"
colored = "2.0.0"
unescape = "0.1.0"
shell-words = "1.1.0"
rocksdb = "0.20.1"

tempfile = "3.3.0"
telemetry-subscribers.workspace = true

move-core-types.workspace = true
move-package.workspace = true
move-bytecode-verifier.workspace = true
workspace-hack = { version = "0.1", path = "../workspace-hack" }
csv = "1.2.1"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
jemalloc-ctl = "^0.5"

[dev-dependencies]
tempfile = "3.3.0"
futures = "0.3.23"
prometheus = "0.13.3"
fs_extra = "1.3.0"
indexmap = "1.9.2"
insta = { version = "1.21.1", features = ["json"] }
jsonrpsee = { version = "0.16.2", features = ["jsonrpsee-core"] }
test-utils = { path = "../test-utils" }
rand = "0.8.5"
expect-test = "1.4.0"
move-binary-format.workspace = true
move-package.workspace = true

haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-json-rpc = { path = "../haneul-json-rpc" }
haneul-node = { path = "../haneul-node" }
haneul-macros = { path = "../haneul-macros" }
haneul-simulator = { path = "../haneul-simulator" }
haneullabs-metrics = { path = "../haneullabs-metrics" }
haneul-tool = { path = "../haneul-tool" }
tokio = { version = "1", features = ["full"] }

assert_cmd = "2.0.6"

[package.metadata.cargo-udeps.ignore]
normal = ["jemalloc-ctl"]


[[example]]
name = "generate-genesis-checkpoint"
path = "src/generate_genesis_checkpoint.rs"
test = false
