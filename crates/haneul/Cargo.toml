[package]
name = "haneul"
version = "0.6.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
serde = { version = "1.0.139", features = ["derive"] }
serde_json = "1.0.80"
signature = "1.5.0"
camino = "1.0.9"
tokio = { version = "1.18.2", features = ["full"] }
async-trait = "0.1.53"
serde_with = { version = "1.14.0", features = ["hex"] }
tracing = "0.1.35"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7e9b7568fc7184b4938976330122f3c8064e3236" }

haneul-core = { path = "../haneul-core" }
haneul-framework = { path = "../haneul-framework" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-json = { path = "../haneul-json" }
haneul-gateway = { path = "../haneul-gateway" }
haneul-swarm = { path = "../haneul-swarm" }
haneul-json-rpc-types= { path = "../haneul-json-rpc-types" }
haneul-sdk = { path = "../haneul-sdk" }

rustyline = "9.1.2"
rustyline-derive = "0.6.0"
colored = "2.0.0"
unescape = "0.1.0"
shell-words = "1.1.0"

move-core-types = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f", features = ["address20"] }
move-prover = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }
move-prover-boogie-backend = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }
move-unit-test = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }
move-cli = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }
move-package = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }

workspace-hack = { path = "../workspace-hack"}
multiaddr = "0.14.0"
bcs = "0.1.3"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
jemallocator = { version = "^0.5", features = ["profiling"] }
jemalloc-ctl = "^0.5"

[dev-dependencies]
tempfile = "3.3.0"
futures = "0.3.21"
jsonrpsee = { version = "0.14.0", features = ["full"] }
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7e9b7568fc7184b4938976330122f3c8064e3236"}
test-utils = { path = "../test-utils" }
haneul-quorum-driver = { path = "../haneul-quorum-driver" }
rand = "0.7.3"
move-package = { git = "https://github.com/move-language/move", rev = "7733658048a8bc80e9ba415b8c99aed9234eaa5f" }
haneul-core = { path = "../haneul-core" }
haneul-node = { path = "../haneul-node" }
