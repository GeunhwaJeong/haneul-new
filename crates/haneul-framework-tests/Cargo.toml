[package]
name = "haneul-framework-tests"
version = "0.1.0"
edition = "2021"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Runs Move tests for haneul-framework"
license = "Apache-2.0"
publish = false

[dev-dependencies]
prometheus = "0.13.3"

haneul-framework = { path = "../haneul-framework" }
haneul-move = { path = "../haneul-move", features = ["unit_test"] }
haneul-move-build = { path = "../haneul-move-build" }
haneul-protocol-config = { path = "../haneul-protocol-config" }
haneul-types = { path = "../haneul-types" }

move-bytecode-verifier = { path = "../../external-crates/move/move-bytecode-verifier" }
haneul-adapter = { path = "../../haneul-execution/latest/haneul-adapter", package = "haneul-adapter-latest" }
haneul-verifier = { path = "../../haneul-execution/latest/haneul-verifier", package = "haneul-verifier-latest" }

move-cli.workspace = true
move-package.workspace = true
move-unit-test.workspace = true

[dependencies]
workspace-hack = { version = "0.1", path = "../workspace-hack" }
