[package]
name = "haneul-core"
version = "0.9.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
rocksdb = "0.19.0"
anyhow = { version = "1.0.64", features = ["backtrace"] }
bcs = "0.1.3"
chrono = "0.4.0"
futures = "0.3.23"
bytes = "1.2.1"
serde = { version = "1.0.144", features = ["derive"] }
serde_json = "1.0.83"
serde_with = "1.14.0"
tokio = { version = "1.20.1", features = ["full", "tracing", "test-util"] }
tokio-stream = { version = "0.1.8", features = ["sync", "net"] }
parking_lot = "0.12.1"
async-trait = "0.1.57"
tempfile = "3.3.0"
tracing = "0.1.36"
signature = "1.6.0"
bincode = "1.3.3"
multiaddr = "0.14.0"
prometheus = "0.13.1"
arc-swap = "1.5.1"
tokio-retry = "0.3"
scopeguard = "1.1"
once_cell = "1.14.0"
tap = "1.0"

haneul-adapter = { path = "../haneul-adapter" }
haneul-framework = { path = "../haneul-framework" }
haneul-network = { path = "../haneul-network" }
haneul-types = { path = "../haneul-types" }
haneul-storage = { path = "../haneul-storage" }
haneul-config = { path = "../haneul-config" }
haneul-json = { path = "../haneul-json" }
haneul-json-rpc-types = { path = "../haneul-json-rpc-types" }

move-binary-format = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e" }
move-bytecode-utils = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e" }
move-core-types = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e", features = ["address20"] }
move-vm-runtime = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e" }

typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d96230a9272c322a7eefac49708aadfff1eed77e"}
typed-store-macros = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d96230a9272c322a7eefac49708aadfff1eed77e"}
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d96230a9272c322a7eefac49708aadfff1eed77e" }

narwhal-config = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "config" }
narwhal-consensus = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "consensus" }
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "executor" }
narwhal-types = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "types" }
narwhal-node = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "node" }

fastcrypto = { git = "https://github.com/GeunhwaJeong/fastcrypto", rev = "c022a2ae23ca7cc2778293fd3b1db42e8cd02d3b"}
workspace-hack = { path = "../workspace-hack"}
thiserror = "1.0.32"
eyre = "0.6.8"

[dev-dependencies]
clap = { version = "3.2.17", features = ["derive"] }
rand = "0.8.5"
move-package = { git = "https://github.com/move-language/move", rev = "e1e647b73dbd3652aabb2020728a4a517c26e28e" }

serde-reflection = "0.3.6"
serde_yaml = "0.8.26"
pretty_assertions = "1.2.1"
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "d96230a9272c322a7eefac49708aadfff1eed77e" }

test-fuzz = "3.0.4"
test-utils = { path = "../test-utils" }

[[example]]
name = "generate-format"
path = "src/generate_format.rs"
test = false
