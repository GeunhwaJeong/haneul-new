[package]
name = "haneul-tool"
version = "0.6.2"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "123c9e40b529315e1c1d91a54fb717111c3e349c" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "123c9e40b529315e1c1d91a54fb717111c3e349c" }
textwrap = "0.15"
futures = "0.3.21"
rocksdb = "0.18.0"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "123c9e40b529315e1c1d91a54fb717111c3e349c"}
tempfile = "3.3.0"
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "259a37b487570763575e6b28f8b8057b16b3e916", package = "executor" }
serde_with = { version = "1.14.0", features = ["hex"] }
haneul-storage = { path = "../haneul-storage" }
serde = { version = "1.0.141", features = ["derive"] }

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

colored = "2.0.0"
workspace-hack = { path = "../workspace-hack"}
