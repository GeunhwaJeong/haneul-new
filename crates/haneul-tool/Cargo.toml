[package]
name = "haneul-tool"
version = "0.6.1"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.0", features = ["full"] }
tracing = "0.1.35"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "123c9e40b529315e1c1d91a54fb717111c3e349c" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "123c9e40b529315e1c1d91a54fb717111c3e349c" }
textwrap = "0.15"
futures = "0.3.21"

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

rustyline = "9.1.2"
rustyline-derive = "0.7.0"
colored = "2.0.0"
unescape = "0.1.0"
shell-words = "1.1.0"

workspace-hack = { path = "../workspace-hack"}
