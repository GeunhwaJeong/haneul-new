[package]
name = "haneul-tool"
version = "0.6.2"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "8d090689be14078f2ca41c356e7bbc0af21f73ab" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "8d090689be14078f2ca41c356e7bbc0af21f73ab" }
textwrap = "0.15"
futures = "0.3.23"
rocksdb = "0.19.0"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "8d090689be14078f2ca41c356e7bbc0af21f73ab"}
typed-store-macros = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "8d090689be14078f2ca41c356e7bbc0af21f73ab"} 
tempfile = "3.3.0"
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "ad05db4c5d6f851402efc7d2b285e9b59d513e64", package = "executor" }
serde_with = { version = "1.14.0", features = ["hex"] }
haneul-storage = { path = "../haneul-storage" }
strum_macros = "^0.24"
strum = "0.24.1"
serde = { version = "1.0.141", features = ["derive"] }
eyre = "0.6.8"

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

colored = "2.0.0"
workspace-hack = { path = "../workspace-hack"}
