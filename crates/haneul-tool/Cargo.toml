[package]
name = "haneul-tool"
version = "0.9.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.2.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "0a2956d113d29369a8c05bd492c51ca0ff3423e8" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "0a2956d113d29369a8c05bd492c51ca0ff3423e8" }
textwrap = "0.15"
futures = "0.3.23"
rocksdb = "0.19.0"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "0a2956d113d29369a8c05bd492c51ca0ff3423e8"}
typed-store-macros = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "0a2956d113d29369a8c05bd492c51ca0ff3423e8"}
tempfile = "3.3.0"
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "842a611a0a58dd378a904d85f79b4edbbbc7b137", package = "executor" }
serde_with = { version = "1.14.0", features = ["hex"] }
haneul-storage = { path = "../haneul-storage" }
strum_macros = "^0.24"
strum = "0.24.1"
serde = { version = "1.0.144", features = ["derive"] }
eyre = "0.6.8"

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

colored = "2.0.0"
workspace-hack = { path = "../workspace-hack"}
