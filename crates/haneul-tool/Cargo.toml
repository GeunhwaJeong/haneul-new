[package]
name = "haneul-tool"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[dependencies]
anyhow.workspace = true
num_cpus.workspace = true
bcs.workspace = true
clap = { version = "4.1.4", features = ["derive"] }
colored.workspace = true
comfy-table.workspace = true
eyre.workspace = true
futures.workspace = true
hex.workspace = true
move-core-types.workspace = true
itertools.workspace = true
ron.workspace = true
serde.workspace = true
serde_json.workspace = true
strum.workspace = true
strum_macros.workspace = true
tempfile.workspace = true
tracing.workspace = true
prometheus.workspace = true
object_store.workspace = true
indicatif.workspace = true
consensus-core.workspace = true
haneullabs-metrics.workspace = true

anemo-cli.workspace = true
anemo.workspace = true
base64.workspace = true
reqwest = { workspace = true, features = ["blocking"] }
rustyline = { version = "14" }
telemetry-subscribers.workspace = true
tokio = { workspace = true, features = ["full"] }
typed-store.workspace = true
fastcrypto.workspace = true

haneul-config.workspace = true
haneul-core.workspace = true
haneul-network.workspace = true
haneul-snapshot.workspace = true
haneul-protocol-config.workspace = true
haneul-replay.workspace = true
haneul-rpc-api.workspace = true
haneul-storage.workspace = true
haneul-types.workspace = true
haneul-package-dump.workspace = true
haneul-tls.workspace = true
bin-version.workspace = true

[target.'cfg(not(windows))'.dependencies]
tideconsole = {git = "https://github.com/GeunhwaJeong/tidehunter.git", rev = "2e0cd5669b1b6776e204e9ad0385189a65a62236", package = "tideconsole", optional = true}
rhai = { version = "1", optional = true }
rustyline = { version = "14", optional = true }
parking_lot = { workspace = true, optional = true }

[features]
tideconsole = ["dep:tideconsole", "dep:rhai", "dep:rustyline", "dep:parking_lot"]
