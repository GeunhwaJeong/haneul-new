[package]
name = "haneul-tool"
version = "0.8.0"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.2.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7ef7415a4e11cf68fa68ce9db884c46e704e0445" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7ef7415a4e11cf68fa68ce9db884c46e704e0445" }
textwrap = "0.15"
futures = "0.3.23"
rocksdb = "0.19.0"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7ef7415a4e11cf68fa68ce9db884c46e704e0445"}
typed-store-macros = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "7ef7415a4e11cf68fa68ce9db884c46e704e0445"}
tempfile = "3.3.0"
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "57ef1b03d8997f5b54a7cae6d147e2ada1529312", package = "executor" }
serde_with = { version = "1.14.0", features = ["hex"] }
haneul-storage = { path = "../haneul-storage" }
strum_macros = "^0.24"
strum = "0.24.1"
serde = { version = "1.0.144", features = ["derive"] }
eyre = "0.6.8"

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

colored = "2.0.0"
workspace-hack = { path = "../workspace-hack"}
