[package]
name = "haneul-tool"
version = "0.6.2"
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.58", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.1.17", features = ["derive"] }
telemetry-subscribers = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e" }
haneullabs-network = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e" }
textwrap = "0.15"
futures = "0.3.21"
rocksdb = "0.19.0"
typed-store = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e"}
typed-store-macros = { git = "https://github.com/GeunhwaJeong/haneullabs-infra", rev = "f4aa523d3029bd6a23bead5f04c182f2cfa04c5e"} 
tempfile = "3.3.0"
narwhal-executor = { git = "https://github.com/GeunhwaJeong/narwhal", rev = "ef4536f3db403fda6d6c1c12ccb0ca827974e4fc", package = "executor" }
serde_with = { version = "1.14.0", features = ["hex"] }
haneul-storage = { path = "../haneul-storage" }
strum_macros = "^0.24"
strum = "0.24.1"
serde = { version = "1.0.141", features = ["derive"] }

haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }

colored = "2.0.0"
workspace-hack = { path = "../workspace-hack"}
