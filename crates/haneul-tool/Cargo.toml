[package]
name = "haneul-tool"
version.workspace = true
authors = ["Haneul Labs <build@haneul-labs.com>"]
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
tokio = { version = "1.20.1", features = ["full"] }
tracing = "0.1.36"
clap = { version = "3.2.17", features = ["derive"] }

haneullabs-network = "0.1.0"
itertools = { version = "0.10.3", features = ["use_alloc"] }
multiaddr = "0.16.0"
textwrap = "0.16"
futures = "0.3.23"
rocksdb = "0.19.0"
tempfile = "3.3.0"
serde_with = { version = "2.0.1", features = ["hex"] }
strum_macros = "^0.24"
strum = "0.24.1"
serde = { version = "1.0.144", features = ["derive"] }
eyre = "0.6.8"

haneul-storage = { path = "../haneul-storage" }
haneul-core = { path = "../haneul-core" }
haneul-config = { path = "../haneul-config" }
haneul-types = { path = "../haneul-types" }
haneul-network = { path = "../haneul-network" }

telemetry-subscribers.workspace = true

colored = "2.0.0"
workspace-hack.workspace = true
