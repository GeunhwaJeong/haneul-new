[workspace]
resolver = "2"
members = [
    "crates/component", 
    "crates/haneullabs-network", 
    "crates/haneullabs-util-mem",
    "crates/haneullabs-util-mem-derive", 
    "crates/name-variant", 
    "crates/prometheus-closure-metric", 
    "crates/rccheck",
    "crates/haneul",
    "crates/haneul-adapter",
    "crates/haneul-adapter-transactional-tests",
    "crates/haneul-benchmark",
    "crates/haneul-cluster-test",
    "crates/haneul-config",
    "crates/haneul-core",
    "crates/haneul-cost",
    "crates/haneul-cost-tables",
    "crates/haneul-faucet",
    "crates/haneul-framework",
    "crates/haneul-framework-build",
    "crates/haneul-gateway",
    "crates/haneul-json",
    "crates/haneul-json-rpc",
    "crates/haneul-json-rpc-types",
    "crates/haneul-keys",
    "crates/haneul-macros",
    "crates/haneul-metrics",
    "crates/haneul-network",
    "crates/haneul-node",
    "crates/haneul-open-rpc",
    "crates/haneul-open-rpc-macros",
    "crates/haneul-rosetta",
    "crates/haneul-sdk",
    "crates/haneul-simulator",
    "crates/haneul-storage",
    "crates/haneul-swarm",
    "crates/haneul-telemetry",
    "crates/haneul-test-validator",
    "crates/haneul-tool",
    "crates/haneul-transaction-builder",
    "crates/haneul-transactional-test-runner",
    "crates/haneul-types",
    "crates/haneul-verifier",
    "crates/haneul-verifier-transactional-tests",
    "crates/telemetry-subscribers",
    "crates/test-utils",
    "crates/typed-store", 
    "crates/typed-store-derive",
    "crates/workspace-hack",
    "crates/x",
    "narwhal/config", 
    "narwhal/consensus", 
    "narwhal/crypto", 
    "narwhal/dag", 
    "narwhal/examples", 
    "narwhal/executor", 
    "narwhal/network", 
    "narwhal/node", 
    "narwhal/primary", 
    "narwhal/storage", 
    "narwhal/test-utils", 
    "narwhal/types", 
    "narwhal/worker",
]

[workspace.package]
# This version string will be inherited by haneul-core, haneul-faucet, haneul-node, haneul-tools, haneul-sdk, and haneul crates
version = "0.16.0"

[profile.release]
# debug = 1 means line charts only, which is minimum needed for good stack traces
debug = 1
split-debuginfo = 'packed'
strip = 'none'
# Exit process with SIGABRT when any thread panics
panic = 'abort'

# Inherits from the release profile above.
[profile.bench]
# For convenience.
split-debuginfo = 'off'

[profile.simulator]
inherits = "test"
debug = true
debug-assertions = true
overflow-checks = true
# opt-level 1 gives >5x speedup for simulator tests without slowing down build times very much.
opt-level = 1

# Dependencies that should be kept in sync through the whole workspace
[workspace.dependencies]

# Move dependencies
move-binary-format = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-bytecode-utils = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-bytecode-verifier = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-cli = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-compiler = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-core-types = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576", features = ["address20"] }
move-disassembler = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-package = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-stdlib = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-vm-runtime = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-unit-test = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-vm-test-utils = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-vm-types = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-command-line-common = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-transactional-test-runner = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-ir-types = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-prover = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }
move-prover-boogie-backend = { git = "https://github.com/move-language/move", rev = "3ac0cd7b78cc2a6d470b7fefbfd82b0c044ef576" }

fastcrypto = { git = "https://github.com/GeunhwaJeong/fastcrypto", rev = "12c522bea01e4a3d19ecae63d789edcdcce2d66c" }
fastcrypto-zkp = { git = "https://github.com/GeunhwaJeong/fastcrypto", rev = "12c522bea01e4a3d19ecae63d789edcdcce2d66c", package = "fastcrypto-zkp" }

# anemo dependencies
anemo = { git = "https://github.com/GeunhwaJeong/anemo.git", rev = "87d60b249a9954775a95790e3bc9ca1a0df7969f" }
anemo-build = { git = "https://github.com/GeunhwaJeong/anemo.git", rev = "87d60b249a9954775a95790e3bc9ca1a0df7969f" }
anemo-tower = { git = "https://github.com/GeunhwaJeong/anemo.git", rev = "87d60b249a9954775a95790e3bc9ca1a0df7969f" }

# Use the same workspace-hack across crates.
workspace-hack = { path = "crates/workspace-hack" }

haneullabs-network = { path = "crates/haneullabs-network" }
telemetry-subscribers = { path = "crates/telemetry-subscribers" }
haneullabs-util-mem = { path = "crates/haneullabs-util-mem" }
typed-store = { path = "crates/typed-store" }
typed-store-derive = { path = "crates/typed-store-derive" }

# patch sqlx to a version using libsqlite3-sys v0.25.1 or later, see
# https://github.com/launchbadge/sqlx/pull/2176
[patch.crates-io]
sqlx = { git="https://github.com/huitseeker/sqlx", branch="update_libsqlite3" }
