name: Move Prover

on: 
  pull_request:
    paths:
    - 'crates/haneul-framework/sources/**'
    - 'crates/haneul/src/haneul_move/**'
    - 'Cargo.toml'
    - 'Cargo.lock'

jobs:
  move-prover:
    runs-on: [ubuntu-ghcloud]

    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
      
      - name: Prover Setup
        run: |
          crates/haneul/scripts/prover_setup.sh

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build

      - name: Prover Run
        working-directory: crates/haneul-framework
        run: |
          set -o pipefail
          DOTNET_ROOT="$HOME/.dotnet"
          BIN_DIR="$HOME/bin"

          export DOTNET_ROOT="${DOTNET_ROOT}"
          export PATH="${DOTNET_ROOT}/tools:\$PATH"
          export Z3_EXE="${BIN_DIR}/z3"
          export CVC5_EXE="${BIN_DIR}/cvc5"
          export BOOGIE_EXE="${DOTNET_ROOT}/tools/boogie"

          /home/runner/.cargo/bin/cargo run -p haneul -- move prove

