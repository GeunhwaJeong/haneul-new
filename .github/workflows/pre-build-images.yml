name: Trigger pre-build images for Haneul commits

on:
  workflow_dispatch:
  push:
    branches: 
      - 'main'
      - 'devnet'
      - 'testnet'
      - 'mainnet'
      - 'releases/haneul-*-release'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prebuild-haneul-images:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Pre-build Images in HaneulLabs/haneul-operations
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # pin@v3.0.0
        with: 
          repository: HaneulLabs/haneul-operations
          token: ${{ secrets.DOCKER_BINARY_BUILDS_DISPATCH }}
          event-type: prebuild-haneul-images
          client-payload: >
            {
              "haneul_commit": "${{ github.sha }}",
              "push_to_dockerhub": true,
              "build_arm64": false,
              "services": true,
              "graphql_rpc": true,
              "indexer": true,
              "indexer_alt": true,
              "indexer_alt_jsonrpc": true
            }

