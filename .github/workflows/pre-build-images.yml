name: Trigger pre-build images for Haneul commits

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prebuild-haneul-images:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Pre-build Images in HaneulLabs/haneul-operations
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with: 
          repository: HaneulLabs/haneul-operations
          token: ${{ secrets.DOCKER_BINARY_BUILDS_DISPATCH }}
          event-type: prebuild-haneul-images
          client-payload: >
            {
              "haneul_commit": "${{ github.sha }}",
              "caller_name": "haneul_repo_${{ github.ref_name }}",
              "push_to_dockerhub": "true",
              "build_arm64": "${{ github.ref_name != 'main' && (github.ref_name == 'devnet' || github.ref_name == 'testnet' || github.ref_name == 'mainnet' || (startsWith(github.ref_name, 'releases/haneul-') && endsWith(github.ref_name, '-release'))) }}",
              "graphql_rpc": "true",
              "indexer_alt": "true",
              "stress": "true"
            }
