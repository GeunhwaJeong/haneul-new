name: Compatibility Checker

concurrency:
  group: ${{ github.workflow }}

on:
  schedule:
    - cron: "0 6 * * *" # UTC timing is every day at 10pm PST
  workflow_dispatch:
    inputs:
      verbose:
        type: boolean
        required: false
        description: "Run with verbose logging"
        default: false
      preserve-state:
        type: boolean
        required: false
        description: "Preserve database state of previous run"
        default: true

jobs:
  genesis-sync-test:
    timeout-minutes: 720
    permissions:
      # The "id-token: write" permission is required or Machine ID will not be
      # able to authenticate with the cluster.
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Install Teleport
        uses: teleport-actions/setup@75c810ac63a7e9b28ca4795c6111619f2a13ac71 # pin@v1
        with:
          version: 11.3.1
      - name: Authorize against Teleport
        id: auth
        uses: teleport-actions/auth@6e73aa03a98e781ca6692817fbb6e554640a56b3 # pin@v1
        with:
          # Specify the publically accessible address of your Teleport proxy.
          proxy: proxy.haneullabs-int.com:443
          # Specify the name of the join token for your bot.
          token: fullnode-compat-test
          # Specify the length of time that the generated credentials should be
          # valid for. This is optional and defaults to "1h"
          certificate-ttl: 12h

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get latest CI-tagged binary commit hash
        run: echo "CI_COMMIT_HASH=$(git for-each-ref --sort=creatordate refs/tags | grep -E 'haneul_v(.*)_ci' | tail -1 | awk '{ print $1 }')" >> $GITHUB_OUTPUT
        id: get-ci-tag

      # Wipe database from previous runs
      - name: Wipe HaneulDB
        if: ${{ github.event.inputs.preserve-state == false }}
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} --ttl 5 ssh ubuntu@fullnode-compat-test-01 "sudo rm -rf /var/lib/haneul/haneuldb || true"

      # Checkout the latest haneul repo
      - name: Checkout haneul repo
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} --ttl 10 ssh ubuntu@fullnode-compat-test-01 "source ~/.bashrc && source ~/.cargo/env && cd ~/haneul && git fetch origin main && git rebase origin/main"

      # Cargo clean and git restore on any left over files from git checkout
      - name: Environment clean
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} --ttl 5 ssh ubuntu@fullnode-compat-test-01 "source ~/.bashrc && source ~/.cargo/env && cd ~/haneul && cargo clean && git restore ."

      - name: Fetch haneul-node binary
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} --ttl 30 ssh ubuntu@fullnode-compat-test-01 "mkdir -p /var/lib/haneul/bin && cd /var/lib/haneul/bin && wget https://haneul-releases.s3.us-east-1.amazonaws.com/${{ steps.get-ci-tag.outputs.CI_COMMIT_HASH }}/haneul-node && chmod +x haneul-node"

      - name: Run sync script
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} --ttl 720 ssh ubuntu@fullnode-compat-test-01 "cd ~/haneul && echo "Running compatibility checker against binary built at commit hash ${{ steps.get-ci-tag.outputs.CI_COMMIT_HASH }}" && CARGO_TERM_COLOR=always ./scripts/fullnode-sync.sh -p /var/lib/haneul/bin/haneul-node -n testnet ${{ github.event.inputs.verbose == true && '-v' || '' }}"

  notify:
    name: Notify
    needs: [genesis-sync-test]
    runs-on: ubuntu-latest
    if: always() # always notify

    steps:
      - uses: technote-space/workflow-conclusion-action@v3

      - name: Checkout haneul repo main branch
        uses: actions/checkout@755da8c3cf115ac066823e79a1e1788f8940201b # pin@v3

      - name: Get haneul commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export haneul_sha=$(git rev-parse HEAD)
          echo "haneul_sha=${haneul_sha}" >> $GITHUB_ENV

      - name: Get link to logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh_job_link=$(gh api -X GET 'repos/HaneulLabs/haneul/actions/runs/${{ github.run_id }}/jobs' --jq '.jobs.[0].html_url')
          echo "gh_job_link=${gh_job_link}" >> $GITHUB_ENV

      - name: Post to slack
        uses: slackapi/slack-github-action@936158bbe252e9a6062e793ea4609642c966e302 # pin@v1.21.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          HANEUL_SHA: ${{ env.haneul_sha }}
          GH_JOB_LINK: ${{ env.gh_job_link }}
        with:
          channel-id: "compatibility-test-nightly"
          payload: |
            {
              "text": "*${{ github.workflow }}* workflow status: `${{ env.WORKFLOW_CONCLUSION }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.workflow }}* workflow status: `${{ env.WORKFLOW_CONCLUSION }}`"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Haneul commit: <https://github.com/GeunhwaJeong/haneul/commit/${{ env.HANEUL_SHA }}|${{ env.HANEUL_SHA }}> \nRun: <${{ env.GH_JOB_LINK }}|${{ github.run_id }}>"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "To debug failures: See run logs; Rerun with `verbose` logging enabled, `clean` disabled in order to sync from last place); `tsh ssh ubuntu@fullnode-compat-test-01` if needed. \nMetrics can be viewed at https://metrics.haneul.io/d/_nu1mWC7zx/haneul-fullnode?orgId=1&refresh=1m&var-Environment=haneullabs-metrics-internal&var-network=testnet&var-host=fullnode-compat-test-01"
                  }
                }
              ]
            }
