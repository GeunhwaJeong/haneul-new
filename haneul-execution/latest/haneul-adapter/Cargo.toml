[package]
name = "haneul-adapter-latest"
version = "0.1.0"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Adapter and accompanying CLI for local haneul development"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { version = "1.0.64", features = ["backtrace"] }
bcs = "0.1.4"
leb128 = "0.2.5"
once_cell = "1.16"
tracing = "0.1.36"
serde = { version = "1.0.140", features = ["derive"] }

move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-core-types.workspace = true
move-vm-config.workspace = true
move-vm-types.workspace = true

move-bytecode-verifier = { path = "../../../external-crates/move/move-bytecode-verifier" }
move-vm-runtime = { path = "../../../external-crates/move/move-vm/runtime" }
haneul-move-natives = { path = "../haneul-move-natives", package = "haneul-move-natives-latest" }
haneul-verifier = { path = "../haneul-verifier", package = "haneul-verifier-latest" }

haneullabs-metrics = { path = "../../../crates/haneullabs-metrics" }
haneul-macros = { path = "../../../crates/haneul-macros" }
haneul-protocol-config = { path = "../../../crates/haneul-protocol-config" }
haneul-types = { path = "../../../crates/haneul-types" }
workspace-hack = { version = "0.1", path = "../../../crates/workspace-hack" }

[dev-dependencies]
move-package.workspace = true
