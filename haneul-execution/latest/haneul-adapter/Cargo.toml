[package]
name = "haneul-adapter-latest"
version = "0.1.0"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Adapter and accompanying CLI for local haneul development"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { workspace = true, features = ["backtrace"] }
bcs.workspace = true
leb128.workspace = true
tracing.workspace = true
serde.workspace = true

move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-bytecode-verifier-meter.workspace = true
move-core-types.workspace = true
move-vm-config.workspace = true
move-vm-types.workspace = true
haneullabs-metrics.workspace = true

move-bytecode-verifier = { path = "../../../external-crates/move/crates/move-bytecode-verifier" }
move-vm-runtime = { path = "../../../external-crates/move/crates/move-vm-runtime" }
move-vm-profiler = { path = "../../../external-crates/move/crates/move-vm-profiler" }
haneul-move-natives = { path = "../haneul-move-natives", package = "haneul-move-natives-latest" }
haneul-verifier = { path = "../haneul-verifier", package = "haneul-verifier-latest" }

haneul-macros.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
parking_lot.workspace = true

[dev-dependencies]
move-package.workspace = true

[features]
gas-profiler = [
    "haneul-types/gas-profiler",
    "move-vm-runtime/gas-profiler",
    "move-vm-profiler/gas-profiler",
    "move-vm-types/gas-profiler",
    "move-vm-config/gas-profiler",
]
