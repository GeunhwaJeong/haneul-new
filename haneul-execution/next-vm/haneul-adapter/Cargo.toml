[package]
name = "haneul-adapter-next-vm"
version = "0.1.0"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Adapter and accompanying CLI for local haneul development"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { workspace = true, features = ["backtrace"] }
bcs.workspace = true
leb128.workspace = true
tracing.workspace = true
serde.workspace = true

move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-core-types.workspace = true
move-vm-config.workspace = true
move-vm-types.workspace = true

move-bytecode-verifier = { path = "../../../external-crates/move/move-execution/next-vm/crates/move-bytecode-verifier", package = "move-bytecode-verifier-next-vm" }
move-vm-runtime = { path = "../../../external-crates/move/move-execution/next-vm/crates/move-vm-runtime", package = "move-vm-runtime-next-vm" }
move-vm-profiler = { path = "../../../external-crates/move/crates/move-vm-profiler" }
haneul-move-natives = { path = "../haneul-move-natives", package = "haneul-move-natives-next-vm" }
haneul-verifier = { path = "../haneul-verifier", package = "haneul-verifier-next-vm" }

haneul-macros.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
parking_lot.workspace = true
workspace-hack.workspace = true

[dev-dependencies]
move-package.workspace = true
