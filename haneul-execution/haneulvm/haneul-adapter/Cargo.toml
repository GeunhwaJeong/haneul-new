[package]
name = "haneul-adapter-haneulvm"
version = "0.1.0"
authors = ["Haneul Labs <eng@haneul-labs.com>"]
description = "Adapter and accompanying CLI for local haneul development"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
anyhow = { workspace = true, features = ["backtrace"] }
bcs.workspace = true
leb128.workspace = true
tracing.workspace = true
serde.workspace = true

move-binary-format.workspace = true
move-bytecode-utils.workspace = true
move-core-types.workspace = true
move-vm-config.workspace = true
move-vm-types.workspace = true

move-bytecode-verifier = { path = "../../../external-crates/move-execution/haneulvm/move-bytecode-verifier", package = "move-bytecode-verifier-haneulvm" }
move-vm-runtime = { path = "../../../external-crates/move-execution/haneulvm/move-vm/runtime", package = "move-vm-runtime-haneulvm" }
move-vm-profiler = { path = "../../../external-crates/move/move-vm/profiler" }
haneul-move-natives = { path = "../haneul-move-natives", package = "haneul-move-natives-haneulvm" }
haneul-verifier = { path = "../haneul-verifier", package = "haneul-verifier-haneulvm" }

haneul-macros.workspace = true
haneul-protocol-config.workspace = true
haneul-types.workspace = true
parking_lot.workspace = true

workspace-hack = { version = "0.1", path = "../../../crates/workspace-hack" }

[dev-dependencies]
move-package.workspace = true
